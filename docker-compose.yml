services:
  mirofish:
    image: ghcr.io/666ghj/mirofish:latest
    # 加速镜像（如拉取缓慢可替换上方地址）
    # image: ghcr.nju.edu.cn/666ghj/mirofish:latest
    container_name: mirofish
    env_file:
      - .env
    ports:
      - "3000:3000"   # frontend (the simulation / graphs UI)
      - "5001:5001"   # backend API
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
      # Overlay ONLY our patched files on the prebuilt image (the fork and the
      # image are different commits, so mounting all of app/ mismatches
      # locales/etc.). Each is patched against the IMAGE's own copy.
      #   llm_client.py           → Gemini thinking off + higher max_tokens
      #   simulation_runner.py    → default max_rounds to OASIS_DEFAULT_MAX_ROUNDS
      - ./backend/app/utils/llm_client.py:/app/backend/app/utils/llm_client.py
      - ./patches/mirofish/simulation_runner.py:/app/backend/app/services/simulation_runner.py

  # Our price-impact orchestrator: reads stock price history + related news,
  # builds MiroFish seed files, drives the pipeline, returns a prediction.
  stock_seed:
    build:
      context: ./stock_seed
    container_name: stock_seed
    env_file:
      - .env
    environment:
      # Reach the MiroFish backend over the compose network.
      - MIROFISH_BASE_URL=http://mirofish:5001
    ports:
      - "8090:8090"
    depends_on:
      - mirofish
    restart: unless-stopped
